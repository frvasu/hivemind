<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 30px; width: 100%; max-width: 900px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255, 255, 255, 0.1); font-size: 14px; }
        .waterdrop-btn { background: rgba(0, 242, 255, 0.2); border: 1px solid #00f2ff; color: #00f2ff; padding: 10px 20px; border-radius: 50px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="glass-panel">
    <h2>Client Enquiries</h2>
    <table>
        <thead>
            <tr><th>Name</th><th>Contact (Email/Discord)</th><th>Service/Budget</th><th>Details</th></tr>
        </thead>
        <tbody id="enquiryTable"></tbody>
    </table>
    <button class="waterdrop-btn" onclick="location.reload()">Refresh Data</button>
</div>

<script>
    const sheetId = "1iHz84NXwN9Zhza6A8R2N9wK8PaLqOzeBtLW1jsBbQQI";
    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

    fetch(url)
        .then(res => res.text())
        .then(data => {
            const json = JSON.parse(data.substring(47).slice(0, -2));
            const rows = json.table.rows;
            const table = document.getElementById('enquiryTable');
            
            rows.forEach(row => {
                const name = row.c[0]?.v || "-";
                const discord = row.c[1]?.v || "-";
                const email = row.c[2]?.v || "-";
                const phone = row.c[3]?.v || "-";
                const service = row.c[4]?.v || "-";
                const budget = row.c[5]?.v || "-";
                const details = row.c[6]?.v || "-";

                table.innerHTML += `<tr>
                    <td>${name}</td>
                    <td>${email}<br><small>${discord}</small></td>
                    <td>${service}<br><b>₹${budget}</b></td>
                    <td>${details}</td>
                </tr>`;
            });
        });
</script>
</body>
</html>
